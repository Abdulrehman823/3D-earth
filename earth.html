<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Rotating Earth — no @property</title>
<style>
     * { padding:0; margin:0; box-sizing:border-box; }

  body {
    width:100%;
    height:100vh;
    display:grid;
    place-items:center;
    background:#081621;
    overflow:hidden;
  }

  .earth {
    position:relative;
    width:600px;
    aspect-ratio:1;
    border-radius:50%;
    background-image: url('https://i.postimg.cc/9QCCCVsQ/earth.png');
    background-repeat: repeat-x;
    background-size: cover;
    animation: earth 40s linear infinite, pulse 2s linear infinite alternate;
    box-shadow:
      0 -1px 1px 1px rgba(255,255,255,1),
      -1px 1px 1px 1px #64BEC8,
      0 0 8rem -20px #64BEC8,
      inset 0 0 76px -10px #64BEC8,
      inset 0 0 5.6rem -10px #64BEC8;
  }

  .earth::before,
  .earth::after {
    content:'';
    position:absolute;
    left: 10px; 
    height:10px;
    border-radius:50%;
    filter: blur(16px);
    transform-origin: center;
    animation: glow-rotate 10s linear infinite alternate;
    pointer-events: none;
  }

  @keyframes earth {
    0% { background-position: 0 0; }
    100% { background-position: -199% 0; }
  }

  @keyframes pulse {
    0% {
      box-shadow:
        0 -1px 1px 1px rgba(255,255,255,1),
        -1px 1px 1px 1px #64BEC8,
        0 0 8rem -20px #64BEC8,
        inset 0 0 76px -10px #64BEC8,
        inset 0 0 5.6rem -10px #64BEC8;
    }
    100% {
      box-shadow:
        0 -1px 1px 1px rgba(255,255,255,1),
        -1px 1px 1px 1px #64BEC8,
        0 0 10rem -20px #64BEC8,
        inset 0 0 76px -10px #64BEC8,
        inset 0 0 3.6rem -10px #64BEC8;
    }
  }

  @keyframes glow-rotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(180deg); }
  }

</style>
</head>
<body>
   
  <div class="earth" aria-hidden="true"></div>
</body>
</html>
